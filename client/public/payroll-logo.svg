<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Outer hex glow ring gradient -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Outer decorative hex ring (thin, subtle) -->
  <polygon
    points="100,12 157,45 157,111 100,144 43,111 43,45"
    fill="none"
    stroke="hsl(38,90%,55%)"
    stroke-width="1.2"
    opacity="0.4"
  />

  <!-- Main hex background (semi-transparent dark fill for contrast when needed, but mostly transparent) -->
  <!-- Using a very subtle dark tint so the P is readable on light or dark bg -->
  <polygon
    points="100,20 152,50 152,110 100,140 48,110 48,50"
    fill="hsl(220,60%,12%)"
    opacity="0.85"
  />

  <!-- Gold hex border -->
  <polygon
    points="100,20 152,50 152,110 100,140 48,110 48,50"
    fill="none"
    stroke="hsl(38,90%,55%)"
    stroke-width="2.5"
  />

  <!-- Inner hex frame -->
  <polygon
    points="100,30 142,54 142,106 100,130 58,106 58,54"
    fill="none"
    stroke="hsl(38,90%,55%)"
    stroke-width="1"
    opacity="0.45"
  />

  <!-- Corner accent dots -->
  <circle cx="48"  cy="80" r="3" fill="hsl(38,90%,55%)" opacity="0.6"/>
  <circle cx="152" cy="80" r="3" fill="hsl(38,90%,55%)" opacity="0.6"/>

  <!-- Side tick marks -->
  <line x1="43" y1="80" x2="48" y2="80" stroke="hsl(38,90%,55%)" stroke-width="1.2" opacity="0.5"/>
  <line x1="152" y1="80" x2="157" y2="80" stroke="hsl(38,90%,55%)" stroke-width="1.2" opacity="0.5"/>

  <!-- ─── Stylised "₱" / P with currency bars ─── -->
  <!-- Vertical stem -->
  <rect x="88" y="52" width="8" height="56" rx="3" fill="hsl(38,90%,55%)"/>
  <!-- P bowl -->
  <path d="M96,52 Q126,52 126,68 Q126,84 96,84Z" fill="hsl(38,90%,55%)"/>
  <!-- Two horizontal currency bars cutting through the bowl -->
  <rect x="82" y="64" width="26" height="4" rx="1.5" fill="hsl(220,60%,12%)"/>
  <rect x="82" y="74" width="26" height="4" rx="1.5" fill="hsl(220,60%,12%)"/>
</svg>
